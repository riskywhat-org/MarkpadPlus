name: Refactor
description: Propose a code refactoring or structural improvement
title: "[REFACTOR] "
labels: ["refactor"]
body:
  - type: markdown
    attributes:
      value: |
        **IMPORTANT:** Define the PROBLEM only. Do NOT propose solutions, implementation
        details, or architectural suggestions. The implementer will decide the approach.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What code or structure is problematic? (e.g., duplication, poor separation, unclear naming)
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why does this need refactoring now? What pain is it causing?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What areas of the codebase are affected?
    validations:
      required: true
