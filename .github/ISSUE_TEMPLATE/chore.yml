name: Chore
description: Maintenance tasks, dependency updates, or housekeeping
title: "[CHORE] "
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        **IMPORTANT:** Define the PROBLEM only. Do NOT propose solutions, implementation
        details, or architectural suggestions. The implementer will decide the approach.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is the maintenance issue? (e.g., outdated dependency, tech debt, broken CI)
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why does this need attention now? What's the risk of inaction?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What areas of the codebase are affected?
    validations:
      required: true
